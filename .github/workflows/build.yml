name: Build Mimik Scripter

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux system libraries
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libgomp1 libsndfile1 espeak-ng

      - name: Install macOS system libraries
        if: startsWith(matrix.os, 'macos')
        run: brew install espeak-ng

      - name: Cache Kokoro models
        uses: actions/cache@v4
        with:
          path: models
          key: kokoro-models-v1.0

      - name: Install dependencies and download models
        run: node setup.js

      - name: Build distributable
        run: node build.js

      - name: Upload build artifact
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: mimik-scripter-${{ matrix.platform }}
          path: dist/mimik-scripter-${{ matrix.platform }}.zip
          retention-days: 7

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mimik-scripter-${{ matrix.platform }}.zip
